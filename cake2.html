<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cake Feeding 🎂</title>
<script src="optimize.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FFF6EE;
    --pink:#FF6F91;
    --pink-dark:#E0476E;
    --yellow:#FFC75F;
    --mint:#6FCF97;
    --cocoa:#5B3A29;
    --peach:#FFD9B8;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 15% 10%, #fff 0%, transparent 35%),
      radial-gradient(circle at 85% 90%, #ffe6ee 0%, transparent 40%),
      var(--cream);
    font-family:'Nunito', sans-serif;
    color:var(--cocoa);
    overflow-x:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px 12px;
  }
  .container{
    width:100%;
    max-width:620px;
    text-align:center;
    position:relative;
    z-index:2;
  }
  h1.title{
    font-family:'Fredoka', sans-serif;
    font-weight:600;
    font-size:clamp(1.4rem, 4.5vw, 2.1rem);
    color:var(--pink-dark);
    margin:0 0 6px;
    letter-spacing:.5px;
  }
  .stage{
    position:relative;
    min-height:260px;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    gap:clamp(10px,6vw,46px);
    background:#fff;
    border-radius:28px;
    padding:28px 18px 14px;
    box-shadow:0 18px 40px -18px rgba(91,58,41,.35);
    border:3px solid #ffffff;
  }
  .avatar{
    width:clamp(96px,20vw,140px);
    height:auto;
    display:block;
  }
  .character{position:relative;}
  #boy{
    position:absolute;
    right:2%;
    bottom:0;
    transform:translateX(160%);
    opacity:0;
    transition:transform .9s cubic-bezier(.34,1.15,.4,1), opacity .7s ease;
  }
  #boy.enter{
    transform:translateX(0);
    opacity:1;
  }
  .cake-col{
    display:flex;
    flex-direction:column;
    align-items:center;
    cursor:pointer;
    user-select:none;
    -webkit-tap-highlight-color:transparent;
  }
  .cake{
    font-size:clamp(3.2rem,9vw,4.4rem);
    line-height:1;
    transform-origin:50% 80%;
    position:relative;
  }
  .cake.jiggle{ animation:cakeJiggle .4s ease; }
  @keyframes cakeJiggle{
    0%,100%{transform:rotate(0);}
    25%{transform:rotate(-5deg);}
    75%{transform:rotate(5deg);}
  }
  .knife{
    position:absolute;
    top:30%;
    left:50%;
    font-size:1.8rem;
    opacity:0;
    pointer-events:none;
  }
  .knife.swipe{
    animation:knifeSwipe .55s ease forwards;
  }
  @keyframes knifeSwipe{
    0%{ transform:translate(-60px,-20px) rotate(-55deg); opacity:0; }
    15%{ opacity:1; }
    50%{ transform:translate(0,10px) rotate(5deg); opacity:1; }
    100%{ transform:translate(55px,30px) rotate(55deg); opacity:0; }
  }
  .hint{
    font-size:.85rem;
    font-weight:800;
    color:var(--pink-dark);
    margin-top:14px;
    transition:opacity .4s ease;
  }
  #slice{
    position:absolute;
    top:0; left:0;
    font-size:1.9rem;
    opacity:0;
    pointer-events:none;
    transform:translate(-50%,-50%) scale(0);
    transition:left .75s cubic-bezier(.4,.1,.3,1), top .75s cubic-bezier(.4,.1,.3,1), transform .55s cubic-bezier(.34,1.56,.64,1), opacity .35s ease;
    z-index:30;
  }
  .blush{ transition:opacity .4s ease; }
  .eyes-happy, .mouth-eat{ transition:opacity .25s ease; }

  .heart-pop{
    position:absolute;
    font-size:1.3rem;
    pointer-events:none;
    animation:floatHeart 1.5s ease-out forwards;
    z-index:25;
  }
  @keyframes floatHeart{
    0%{ transform:translate(0,0) scale(.5); opacity:0; }
    18%{ opacity:1; }
    100%{ transform:translate(var(--dx,0px), -95px) scale(1); opacity:0; }
  }
  #caption{
    font-family:'Fredoka', sans-serif;
    font-size:clamp(1rem,3.2vw,1.3rem);
    color:var(--pink-dark);
    margin-top:16px;
    opacity:0;
    transform:translateY(8px);
    transition:opacity .5s ease, transform .5s ease;
  }
  #caption.show{ opacity:1; transform:translateY(0); }

  .confetti{
    position:fixed;
    top:-5%;
    width:9px;height:14px;
    border-radius:2px;
    opacity:.85;
    z-index:1;
    animation:confettiFall linear infinite;
  }
  @keyframes confettiFall{
    to{ transform:translateY(115vh) rotate(380deg); opacity:0; }
  }

  #redirectOverlay{
    position:fixed; inset:0;
    background:linear-gradient(135deg, var(--pink), var(--yellow));
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none;
    transition:opacity .5s ease;
    z-index:999;
  }
  #redirectOverlay span{
    font-family:'Fredoka', sans-serif;
    font-size:clamp(1.2rem,4vw,1.7rem);
    color:#fff;
    font-weight:600;
    text-shadow:0 3px 10px rgba(0,0,0,.15);
  }
</style>
</head>
<body>

<span class="confetti" style="left:6%; background:var(--pink); animation-duration:7s; animation-delay:0s;"></span>
<span class="confetti" style="left:18%; background:var(--yellow); animation-duration:9s; animation-delay:1.2s;"></span>
<span class="confetti" style="left:32%; background:var(--mint); animation-duration:6.5s; animation-delay:.6s;"></span>
<span class="confetti" style="left:48%; background:var(--pink-dark); animation-duration:8s; animation-delay:2s;"></span>
<span class="confetti" style="left:63%; background:var(--yellow); animation-duration:7.5s; animation-delay:.3s;"></span>
<span class="confetti" style="left:77%; background:var(--mint); animation-duration:6s; animation-delay:1.8s;"></span>
<span class="confetti" style="left:88%; background:var(--pink); animation-duration:8.5s; animation-delay:.9s;"></span>

<div class="container">
  <h1 class="title">Birthday Cake 🎉</h1>
  
  <div class="stage" id="stage">
    <div class="character" id="girl">
      <svg class="avatar" viewBox="0 0 160 200" aria-hidden="true">
        <path d="M30 70 Q20 30 80 25 Q140 30 130 70 L130 112 Q130 60 80 55 Q30 60 30 112 Z" fill="var(--cocoa)"/>
        <circle cx="22" cy="80" r="16" fill="var(--cocoa)"/>
        <circle cx="138" cy="80" r="16" fill="var(--cocoa)"/>
        <path d="M40 150 Q80 130 120 150 L132 200 L28 200 Z" fill="var(--pink)"/>
        <path d="M40 150 Q80 166 120 150" fill="none" stroke="var(--mint)" stroke-width="4" stroke-linecap="round"/>
        <circle cx="80" cy="95" r="46" fill="var(--peach)"/>
        <path d="M36 80 Q80 50 124 80 Q120 60 80 58 Q40 60 36 80 Z" fill="var(--cocoa)"/>
        <ellipse class="blush" cx="55" cy="106" rx="9" ry="6" fill="var(--pink)" opacity="0"/>
        <ellipse class="blush" cx="105" cy="106" rx="9" ry="6" fill="var(--pink)" opacity="0"/>
        <g class="eyes-normal">
          <circle cx="62" cy="92" r="5" fill="var(--cocoa)"/>
          <circle cx="98" cy="92" r="5" fill="var(--cocoa)"/>
        </g>
        <g class="eyes-happy" opacity="0">
          <path d="M55 92 Q62 84 69 92" fill="none" stroke="var(--cocoa)" stroke-width="3" stroke-linecap="round"/>
          <path d="M91 92 Q98 84 105 92" fill="none" stroke="var(--cocoa)" stroke-width="3" stroke-linecap="round"/>
        </g>
        <path d="M65 112 Q80 122 95 112" class="mouth-normal" fill="none" stroke="var(--cocoa)" stroke-width="3.5" stroke-linecap="round"/>
        <ellipse class="mouth-eat" cx="80" cy="115" rx="9" ry="7" fill="var(--cocoa)" opacity="0"/>
        <circle cx="118" cy="66" r="6" fill="var(--yellow)"/>
        <circle id="girlMouth" cx="80" cy="113" r="1" fill="transparent"/>
      </svg>
    </div>

    <div class="cake-col" id="cakeWrap" tabindex="0" role="button" aria-label="Cake cut karo">
      <div class="cake" id="cake">
        🎂
        <span class="knife" id="knife">🔪</span>
      </div>
    </div>

    <div class="character" id="boy">
      <svg class="avatar" viewBox="0 0 160 200" aria-hidden="true">
        <path d="M38 150 Q80 132 122 150 L132 200 L28 200 Z" fill="var(--yellow)"/>
        <path d="M38 150 Q80 162 122 150" fill="none" stroke="var(--mint)" stroke-width="4" stroke-linecap="round"/>
        <circle cx="80" cy="95" r="46" fill="var(--peach)"/>
        <path d="M32 85 Q28 38 80 32 Q132 38 128 85 Q128 55 80 52 Q32 55 32 85 Z" fill="var(--cocoa)"/>
        <path d="M55 38 L60 18 L68 36 Z" fill="var(--cocoa)"/>
        <path d="M75 32 L80 12 L88 32 Z" fill="var(--cocoa)"/>
        <path d="M96 36 L104 18 L110 38 Z" fill="var(--cocoa)"/>
        <ellipse class="blush" cx="55" cy="106" rx="9" ry="6" fill="var(--pink)" opacity="0"/>
        <ellipse class="blush" cx="105" cy="106" rx="9" ry="6" fill="var(--pink)" opacity="0"/>
        <g class="eyes-normal">
          <circle cx="62" cy="93" r="5" fill="var(--cocoa)"/>
          <circle cx="98" cy="93" r="5" fill="var(--cocoa)"/>
        </g>
        <g class="eyes-happy" opacity="0">
          <path d="M55 93 Q62 85 69 93" fill="none" stroke="var(--cocoa)" stroke-width="3" stroke-linecap="round"/>
          <path d="M91 93 Q98 85 105 93" fill="none" stroke="var(--cocoa)" stroke-width="3" stroke-linecap="round"/>
        </g>
        <path d="M64 112 Q80 124 98 110" class="mouth-normal" fill="none" stroke="var(--cocoa)" stroke-width="3.5" stroke-linecap="round"/>
        <ellipse class="mouth-eat" cx="80" cy="115" rx="9" ry="7" fill="var(--cocoa)" opacity="0"/>
        <circle id="boyHand" cx="18" cy="142" r="1" fill="transparent"/>
        <circle id="boyMouth" cx="80" cy="113" r="1" fill="transparent"/>
      </svg>
    </div>

    <span id="slice">🍰</span>
  </div>

  <p class="hint" id="hint">👆 Cake pe tap karo</p>
  <p id="caption">Yummy! 😋💖</p>
</div>

<div id="redirectOverlay"><span>Ab kuch khelte hain... 🎮</span></div>

<script>
  const cakeWrap = document.getElementById('cakeWrap');
  const cake = document.getElementById('cake');
  const knife = document.getElementById('knife');
  const boy = document.getElementById('boy');
  const girl = document.getElementById('girl');
  const stage = document.getElementById('stage');
  const slice = document.getElementById('slice');
  const hint = document.getElementById('hint');
  const caption = document.getElementById('caption');
  const boyHand = document.getElementById('boyHand');
  const girlMouth = document.getElementById('girlMouth');
  const boyMouth = document.getElementById('boyMouth');
  const redirectOverlay = document.getElementById('redirectOverlay');

  let started = false;

  function setSlicePos(targetEl){
    const stageRect = stage.getBoundingClientRect();
    const r = targetEl.getBoundingClientRect();
    const x = r.left + r.width/2 - stageRect.left;
    const y = r.top + r.height/2 - stageRect.top;
    slice.style.left = x + 'px';
    slice.style.top = y + 'px';
  }

  function placeSliceInstant(targetEl){
    slice.style.transition = 'none';
    setSlicePos(targetEl);
    slice.style.transform = 'translate(-50%,-50%) scale(0)';
    void slice.offsetWidth;
    slice.style.transition = '';
  }

  function popSliceIn(){
    slice.style.opacity = '1';
    slice.style.transform = 'translate(-50%,-50%) scale(1)';
  }

  function moveSliceTo(targetEl){
    setSlicePos(targetEl);
  }

  function spawnHearts(originEl, count){
    const stageRect = stage.getBoundingClientRect();
    const r = originEl.getBoundingClientRect();
    const ox = r.left + r.width/2 - stageRect.left;
    const oy = r.top - stageRect.top;
    const glyphs = ['❤️','💕','✨'];
    for(let i=0;i<count;i++){
      const h = document.createElement('span');
      h.className = 'heart-pop';
      h.textContent = glyphs[Math.floor(Math.random()*glyphs.length)];
      h.style.left = (ox + (Math.random()*60-30)) + 'px';
      h.style.top = oy + 'px';
      h.style.setProperty('--dx', (Math.random()*70-35) + 'px');
      h.style.animationDelay = (Math.random()*0.3) + 's';
      stage.appendChild(h);
      setTimeout(()=> h.remove(), 1800);
    }
  }

  function feedingTimeline(){
    // 1. केक लड़की के मुंह के पास जाता है और लड़की मुंह खोलती है
    girl.querySelector('.mouth-normal').style.opacity = '0';
    girl.querySelector('.mouth-eat').style.opacity = '1';

    // 2. लड़की आधा केक खा लेती है, आँखें बंद करके खुश होती है
    setTimeout(() => {
      girl.querySelector('.mouth-eat').style.opacity = '0';
      girl.querySelector('.mouth-normal').style.opacity = '1';
      girl.querySelector('.eyes-normal').style.opacity = '0';
      girl.querySelector('.eyes-happy').style.opacity = '1';
      girl.querySelectorAll('.blush').forEach(b => b.style.opacity = '1');
      spawnHearts(girl, 4);
      caption.classList.add('show');

      // 3. अब बचा हुआ केक लड़के के मुंह के पास जाता है!
      setTimeout(() => {
        moveSliceTo(boyMouth);
        
        // लड़का मुंह खोलता है केक खाने के लिए
        setTimeout(() => {
          boy.querySelector('.mouth-normal').style.opacity = '0';
          boy.querySelector('.mouth-eat').style.opacity = '1';
          
          // 4. लड़का पूरा केक खा लेता है, केक गायब और लड़का खुश!
          setTimeout(() => {
            slice.style.opacity = '0';
            slice.style.transform = 'translate(-50%,-50%) scale(0)';
            
            boy.querySelector('.mouth-eat').style.opacity = '0';
            boy.querySelector('.mouth-normal').style.opacity = '1';
            boy.querySelector('.eyes-normal').style.opacity = '0';
            boy.querySelector('.eyes-happy').style.opacity = '1';
            boy.querySelectorAll('.blush').forEach(b => b.style.opacity = '1');
            
            spawnHearts(boy, 5);
          }, 400);

        }, 500);

      }, 1200);

    }, 800);
  }

  function cutCake(){
    if(started) return;
    started = true;
    hint.style.opacity = '0';

    knife.classList.add('swipe');
    setTimeout(()=> cake.classList.add('jiggle'), 80);

    setTimeout(()=>{
      placeSliceInstant(cake);
      requestAnimationFrame(()=> popSliceIn());
    }, 650);

    setTimeout(()=> boy.classList.add('enter'), 1550);

    // लड़का केक उठाता है
    setTimeout(()=> moveSliceTo(boyHand), 2550);

    // केक लड़की के मुंह के पास जाता है
    setTimeout(()=> moveSliceTo(girlMouth), 3400);

    // फीडिंग और चबाने का दोनों का एक्शन सीक्वेंस शुरू
    setTimeout(()=> feedingTimeline(), 4150);

    // गेम स्क्रीन पर ट्रांज़िशन
    setTimeout(()=>{
      redirectOverlay.style.opacity = '1';
      redirectOverlay.style.pointerEvents = 'auto';
    }, 8500);

    setTimeout(()=>{
      window.location.href = 'heart_game.html';
    }, 10000);
  }

  cakeWrap.addEventListener('click', cutCake);
  cakeWrap.addEventListener('keydown', (e)=>{
    if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); cutCake(); }
  });
</script>
</body>
</html>
